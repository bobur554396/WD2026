<h2>All Products</h2>

@if (loading()) {
  <p>Loading products...</p>
} @else if (error()) {
  <p style="color: red;">{{ error() }}</p>
} @else {
  <p>{{ products().length }} products loaded</p>
  <ul>
    @for (product of products(); track product.id) {
      <li>
        <a [routerLink]="['/products', product.id]">
          {{ product.id }} — {{ product.name }}
        </a>
      </li>
    }
  </ul>
}
